server:
  port: 8080

spring:
  application:
    name: payment-service-app
  profiles:
    active: kafka

  datasource:
    url: jdbc:postgresql://postgres:5432/payment-db
    username: admin
    password: secret

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8085/realms/pet-lms

management:
  tracing:
    sampling:
      probability: 1.0 # 100% для отладки; в продакшн должен быть меньше
    propagation:
      type: w3c,b3 # чтобы понимать и traceparent, и b3
  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans

logging:
  level:
    root: WARN
    org.springframework.boot.autoconfigure.liquibase: WARN
    liquibase: WARN
    org.liquibase: WARN
    org.springframework.jdbc.core: INFO
    org.springframework.security: INFO
    org.springframework.security.oauth2: INFO
    org.springframework.web: INFO
    org.springframework.data: WARN
    org.springframework.boot.autoconfigure: WARN
